name: deploy

# P1 CI/CD for the LyricBridge Modal deploy. Two delivery paths, gated by tests:
#   backend  → `modal deploy` (default env; see note) + smoke-checks the live sha
#   frontend → GitHub Pages (static web/, with the Modal URL injected into the meta)
#
# OWNER PREREQUISITES (one-time, cannot be automated):
#   1. Create a CI Modal token: `modal token new` → add MODAL_TOKEN_ID and
#      MODAL_TOKEN_SECRET as GitHub Actions secrets (Settings → Secrets → Actions).
#   2. Settings → Pages → Source = "GitHub Actions".
#
# NOTE on environments: we deploy to the DEFAULT Modal env (no --env prod). Only one
# env can own the canonical empty-suffix URL (chkrap47--lyricbridge-web.modal.run),
# and `modal serve` apps are ephemeral so they can't clobber this deploy. Opt into a
# separate prod env later only if you also reconfigure the env web suffixes.

on:
  push:
    branches: [main]
    paths: ["server/**", "deploy/**", "web/**", ".github/workflows/deploy.yml"]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # Backend URL (smoke check + frontend meta inject). Set as a repo VARIABLE
  # (Settings → Secrets and variables → Actions → Variables), not a secret —
  # it's a public URL. Falls back to the known prod URL if the variable is unset.
  PROD_URL: ${{ vars.PROD_URL || 'https://chkrap47--lyricbridge-web.modal.run' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # Heavy (torch + whisperx + audio-separator) but tests mock all model loads,
      # so no weights/GPU/network are needed at test time. pytest + httpx are
      # test-only deps (httpx backs starlette's TestClient). starlette is pinned in
      # requirements.txt to a version that uses genuine httpx, so no extra package.
      - run: pip install -r server/requirements.txt pytest "httpx==0.28.1"
      - run: pytest server/ -q          # 91 mocked tests
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd web && node --test       # player.test.mjs (37 tests)

  deploy-backend:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }
      - run: pip install modal
      - name: Deploy backend
        run: PYTHONPATH=server modal deploy deploy/modal_app.py
      - name: Stamp live commit sha (read by /healthz via the control Dict)
        env:
          GIT_SHA: ${{ github.sha }}
        run: PYTHONPATH=server modal run deploy/modal_app.py::set_control --key GIT_SHA --value "$GIT_SHA"

  smoke-prod:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: healthz reports the deployed sha
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          for i in $(seq 1 10); do
            sha=$(curl -fsS "$PROD_URL/healthz" | jq -r .git_sha || echo "")
            echo "try $i: deployed=$sha expected=$GIT_SHA"
            [ "$sha" = "$GIT_SHA" ] && { echo "smoke OK"; exit 0; }
            sleep 6
          done
          echo "MISMATCH: /healthz never reported the deployed sha"; exit 1

  deploy-frontend:
    # Gate on smoke-prod (not just test): publishing the static site points users
    # at the backend, so don't ship the frontend if the backend deploy or its
    # live /healthz smoke failed — that would leave the page aimed at a broken API.
    needs: smoke-prod
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject the Modal backend URL into the api-base meta
        # Phase L: the player page moved to web/app.html (index.html is now the
        # static landing, which carries no api-base meta). Inject into app.html or
        # the hosted player won't know its backend URL.
        run: |
          sed -i "s#<meta name=\"lyricbridge-api-base\" content=\"\" />#<meta name=\"lyricbridge-api-base\" content=\"${PROD_URL}\" />#" web/app.html
          echo "after inject:"; grep lyricbridge-api-base web/app.html
          grep -q "content=\"${PROD_URL}\"" web/app.html || { echo "meta injection failed"; exit 1; }
      - name: Inject the Google OAuth client id (Phase A)
        # Public value (it's the JWT `aud`), set as a repo VARIABLE
        # (Settings → Secrets and variables → Actions → Variables → GOOGLE_CLIENT_ID).
        # Optional: if unset, the meta stays empty and the player falls back to the
        # client id /healthz reports (the backend's GOOGLE_CLIENT_ID is the source
        # of truth for whether login is required), so sign-in still works.
        env:
          GCID: ${{ vars.GOOGLE_CLIENT_ID }}
        run: |
          if [ -n "$GCID" ]; then
            sed -i "s#<meta name=\"lyricbridge-google-client-id\" content=\"\" />#<meta name=\"lyricbridge-google-client-id\" content=\"${GCID}\" />#" web/app.html
            grep -q "content=\"${GCID}\"" web/app.html || { echo "google-client-id injection failed"; exit 1; }
            echo "injected google-client-id"
          else
            echo "GOOGLE_CLIENT_ID repo variable unset — leaving meta empty (player uses /healthz value)"
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: web }
      - uses: actions/deploy-pages@v4
